start_1: "{0} نشط الآن.\n\n<b>وقت التشغيل:</b> {1}"
start_2: "مرحبًا {0}،\nأنا {1}،\n\nأعمل كبوت شامل لإدارة المجموعات وتشغيل الوسائط.\n\n• تشغيل الصوت والفيديو في المكالمات.\n• أدوات إشراف وحماية.\n• ترجمة وتوليد صور والمزيد.\n\nللاطلاع على كافة الأوامر اضغط على زر المساعدة.\n\nالمطور: [مطور معتمد](https://t.me/CertifiedCoder)"
start_3: "مرحبًا {0}،\nهذا البوت {1}\n\nشكراً لإضافتي إلى {2}. أصبح بإمكان {3} الآن تشغيل الوسائط في هذه الدردشة."
start_4: "<b>مطلوب مجموعة خارقة (Supergroup)</b>\n\nيرجى ترقية <b>المجموعة</b> إلى <b>مجموعة خارقة</b> ثم أعد إضافتي.\n\n<b>كيفية الترقية؟</b>\n- اجعل سجل الدردشة <b>مرئياً</b> للأعضاء الجدد."
start_5: "<b>المجموعة محظورة</b>\n\nتم حظر هذه المجموعة في قاعدة بيانات {0}.\nتواصل مع <a href={1}>المطور الأساسي</a> أو فريق الدعم <a href={2}>هنا</a> للاستفسار."
start_6: "<b>معلومات المقطع</b>\n\n<b>العنوان:</b> {0}\n<b>المدة:</b> {1} دقيقة\n<b>المشاهدات:</b> <code>{2}</code>\n<b>تاريخ النشر:</b> {3}\n<b>القناة:</b> <a href={4}>{5}</a>\n\n<u><b>بحث بواسطة {6}</b></u>"

